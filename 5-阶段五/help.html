<h1>帮助中心</h1>
<p>欢迎使用用户管理系统！</p>

<h2>功能介绍</h2>
<ul>
    <li><strong>登录</strong>：使用用户名和密码登录系统</li>
    <li><strong>注册</strong>：创建新账户</li>
    <li><strong>搜索</strong>：搜索其他注册用户</li>
    <li><strong>头像上传</strong>：上传个人头像</li>
    <li><strong>个人中心</strong>：查看个人信息和余额</li>
    <li><strong>充值</strong>：为账户充值</li>
</ul>

<h2>常见问题</h2>
<h3>如何修改密码？</h3>
<p>请联系管理员修改密码。</p>

<h3>上传头像失败怎么办？</h3>
<p>请确保文件格式为 jpg、png、gif、webp 或 bmp，且文件大小不超过 16MB。</p>

<h3>余额可以提现吗？</h3>
<p>当前系统余额仅用于教学演示，不支持提现。</p>
