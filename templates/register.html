{% extends "base.html" %}
{% block title %}用户注册 - 用户管理系统{% endblock %}
{% block content %}
<div class="card login-card" role="region" aria-label="注册表单区域">

    <h2 class="card-title" id="register-heading">用户注册</h2>

    {% if error %}
        <div class="error-msg" role="alert" aria-live="assertive" aria-atomic="true">
            {{ error }}
        </div>
    {% endif %}

    <!-- [修复] 表单增加 CSRF token 保护 -->
    <form method="POST" action="/register" class="login-form" aria-labelledby="register-heading">

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" maxlength="50" required>
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" maxlength="128" required>
        </div>

        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="请输入邮箱" maxlength="100">
        </div>

        <div class="form-group">
            <label for="phone">手机号</label>
            <input type="text" id="phone" name="phone" class="form-input" placeholder="请输入手机号" maxlength="20">
        </div>

        <button type="submit" class="btn btn-primary" aria-label="提交注册信息">注册</button>
    </form>
</div>
{% endblock %}
