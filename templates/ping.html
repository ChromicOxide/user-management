{% extends "base.html" %}
{% block title %}Ping 测试 - 用户管理系统{% endblock %}
{% block content %}
<div class="card" role="region" aria-label="Ping 测试区域">

    <h2 class="card-title" id="ping-heading">Ping 网络诊断</h2>

    {% if ping_error %}
    <div class="error-msg" role="alert" aria-live="assertive" aria-atomic="true">{{ ping_error }}</div>
    {% endif %}

    <form method="POST" action="/ping" class="ping-form" aria-labelledby="ping-heading">

        <div class="form-group">
            <label for="ip">IP 地址或域名</label>
            <input type="text" id="ip" name="ip" class="form-input" placeholder="例如 8.8.8.8 或 baidu.com" value="{{ ping_ip or '' }}" required>
        </div>

        <button type="submit" class="btn btn-primary">Ping</button>
    </form>

    {% if ping_result %}
    <div class="ping-output" style="margin-top:20px;">
        <h3 class="section-title">执行结果</h3>
        <pre class="console-output">{{ ping_result }}</pre>
    </div>
    {% endif %}

</div>
{% endblock %}
